<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Performance Evaluation</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="container" id="evaluation-content">
    <div class="header-section">
        <h1>Weekly Performance Evaluation Form</h1>
    </div>

    <form id="evalForm">
        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">Branch:</span> 
                <input type="text" id="branchName" class="required-field" required>
            </div>
            <div class="info-item">
                <span class="info-label">Date:</span> 
                <input type="date" id="evalDate" class="required-field" required>
            </div>
            <div class="info-item">
                <span class="info-label">Employee:</span> 
                <input type="text" id="empName" class="required-field" required>
            </div>
            <div class="info-item">
                <span class="info-label">Position:</span> 
                <select id="empPosition" class="required-field" required>
                    <option value="" disabled selected>Select Position</option>
                    <option value="Trust Staff">Trust Staff</option>
                    <option value="Buffer Trust Staff">Buffer Trust Staff</option>
                    <option value="Senior Trust Staff">Senior Trust Staff</option>
                    <option value="Branch Supervisor">Branch Supervisor</option>
                </select>
            </div>
            <div class="info-item">
                <span class="info-label">Immediate Head:</span> 
                <input type="text" id="headName" class="required-field" required>
            </div>
        </div>

        <div class="section-title">A. QUANTITATIVE PERFORMANCE</div>
        <table id="tableA">
            <thead>
                <tr>
                    <th>Category</th>
                    <th style="width: 15%;">Rating</th>
                    <th>Remarks</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Punctuality</td><td><select class="calc-group-a"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></td><td><input type="text"></td></tr>
                <tr class="score-row">
                    <td>Subtotal (Max 30)</td>
                    <td><span id="subtotal-a">0</span>/30</td>
                    <td id="status-a">NEEDS IMPROVEMENT</td>
                </tr>
            </tbody>
        </table>

        <div class="section-title">
            OVERALL SUMMARY
            <div class="btn-group" id="pdf-buttons">
                <button type="button" class="btn-generate" id="btnAI">Generate AI Remarks</button>
                <button type="button" class="btn-pdf" id="btnPDF">Download PDF</button>
            </div>
        </div>

        <textarea id="box-strengths" placeholder="Strengths..."></textarea>
        <textarea id="box-improvements" placeholder="Improvements..."></textarea>
        <textarea id="box-plan" placeholder="Action Plan..."></textarea>

        <div class="signature-section">
            <div class="sig-box">
                <div class="sig-content"><span id="displayHeadName"></span></div>
                <div class="sig-label">Evaluator</div>
            </div>
            <div class="sig-box">
                <div class="sig-content"><span id="displayEmpName"></span></div>
                <div class="sig-label">Employee</div>
            </div>
        </div>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
